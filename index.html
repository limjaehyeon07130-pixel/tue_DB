<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임재현 팀 경영 성과 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ==========================================
        // 🚀 Gemini API Key 설정 (보안을 위해 제거됨)
        // ==========================================
        const apiKey = ""; 

        const formatMillion = (v) => (!v || isNaN(v)) ? "0원" : `${(v / 100000000).toLocaleString(undefined, { maximumFractionDigits: 1 })}억`;
        const formatRaw = (v) => (!v || isNaN(v)) ? "0" : Number(v).toLocaleString();
        const formatRatio = (v) => (!v || isNaN(v)) ? "0.00%" : `${Number(v).toFixed(2)}%`;
        const formatTurnover = (v) => (!v || isNaN(v)) ? "0.00회" : `${Number(v).toFixed(2)}회`;
        
        const DEMO_QUARTERS = [
          { name: "3차 4Q", sales: 88631620000, operatingProfit: 5069504571, netIncome: 4119883657, totalAssets: 74315106254, totalEquity: 74315106254, currentAssets: 64315106254, quickAssets: 56723088633, inventory: 7836734071, receivables: 35452648000, currentLiabilities: 10000000, krSales: 54225, usSales: 34409, cnSales: 55000, salesVolume: 143634 },
          { name: "4차 1Q", sales: 95061638854, operatingProfit: 5020140115, netIncome: 4990640115, totalAssets: 79156027165, totalEquity: 79156027165, currentAssets: 70156027165, quickAssets: 59671196909, inventory: 10484830256, receivables: 38024655541, currentLiabilities: 10000000, krSales: 57034, usSales: 32204, cnSales: 39491, salesVolume: 128729 },
          { name: "4차 2Q", sales: 120027616700, operatingProfit: 6773813322, netIncome: 6723313322, totalAssets: 85812107354, totalEquity: 85812107354, currentAssets: 77812107354, quickAssets: 52150361487, inventory: 25661745867, receivables: 48011046680, currentLiabilities: 10000000, krSales: 50758, usSales: 34945, cnSales: 55000, salesVolume: 140703 },
          { name: "4차 3Q", sales: 143574593837, operatingProfit: 17965346853, netIncome: 17935206853, totalAssets: 104478689207, totalEquity: 104478689207, currentAssets: 97478689207, quickAssets: 63663946684, inventory: 33814742523, receivables: 57429837535, currentLiabilities: 10000000, krSales: 74765, usSales: 32358, cnSales: 72709, salesVolume: 179832 },
          { name: "4차 4Q", sales: 184376453347, operatingProfit: 15070922124, netIncome: 15075846124, totalAssets: 119554535331, totalEquity: 119554535331, currentAssets: 113554535331, quickAssets: 104065840311, inventory: 9488695020, receivables: 73750581339, currentLiabilities: 10000000, krSales: 72709, usSales: 73824, cnSales: 38062, salesVolume: 184595 },
          { name: "5차 1Q", sales: 164497500392, operatingProfit: 24091689948, netIncome: 20150784448, totalAssets: 143405319779, totalEquity: 143405319779, currentAssets: 120000000000, quickAssets: 105000000000, inventory: 9000000000, receivables: 70000000000, currentLiabilities: 10000000, krSales: 77420, usSales: 34409, cnSales: 54225, salesVolume: 166054 }
        ];

        const parseCSV = (str) => {
          const arr = [];
          let quote = false;
          let row = 0, col = 0;
          for (let c = 0; c < str.length; c++) {
            let cc = str[c], nc = str[c + 1];
            arr[row] = arr[row] || [];
            arr[row][col] = arr[row][col] || '';
            if (cc === '"' && quote && nc === '"') { arr[row][col] += cc; ++c; continue; }
            if (cc === '"') { quote = !quote; continue; }
            if (cc === ',' && !quote) { ++col; continue; }
            if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; ++c; continue; }
            if (cc === '\n' && !quote) { ++row; col = 0; continue; }
            if (cc === '\r' && !quote) { ++row; col = 0; continue; }
            arr[row][col] += cc;
          }
          return arr;
        };

        const INITIAL_INVESTMENTS = [
          { id: "patent", title: "신공정 특허 인수", initial: -2000000000, cf: [800000000, 900000000, 1000000000, 1200000000] },
          { id: "mna", title: "유통채널 M&A", initial: -5000000000, cf: [1500000000, 1800000000, 2200000000, 2500000000] },
          { id: "expansion", title: "신공장 설비 증설", initial: -10000000000, cf: [2500000000, 3500000000, 4500000000, 5500000000] }
        ];

        function App() {
          const spreadsheetInput = "https://docs.google.com/spreadsheets/d/1WMTK2Or9K_HzgGlhKzkSDK41G8J_Q4s4ORV1LS83nsc/edit?gid=0#gid=0";
          const [activeTab, setActiveTab] = useState('summary');
          const [quarters, setQuarters] = useState(DEMO_QUARTERS); 
          const [selectedQIdx, setSelectedQIdx] = useState(5); 
          const [isLinked, setIsLinked] = useState(false);
          const [loading, setLoading] = useState(false);
          const [errorMsg, setErrorMsg] = useState(""); 

          const [price, setPrice] = useState(700000); 
          const [variableCost, setVariableCost] = useState(420000);
          const [fixedCost, setFixedCost] = useState(30000000000); 
          const [targetVolume, setTargetVolume] = useState(150000); 

          const [discountRate, setDiscountRate] = useState(3.0);
          const [investments, setInvestments] = useState(INITIAL_INVESTMENTS);
          const [aiSummaryReport, setAiSummaryReport] = useState("");
          const [isAiSummaryLoading, setIsAiSummaryLoading] = useState(false);
          const [aiDecisionReport, setAiDecisionReport] = useState("");
          const [isAiDecisionLoading, setIsAiDecisionLoading] = useState(false);

          const callGeminiAPI = async (prompt) => {
            if (!apiKey) {
              return "⚠️ API 키가 설정되지 않았습니다. 대시보드 상단의 'apiKey' 변수에 본인의 Gemini API Key를 등록하면 실시간 AI 보고서 분석이 활성화됩니다.";
            }
            const model = "gemini-2.5-flash-preview-09-2025";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            
            const payload = {
              contents: [{ parts: [{ text: prompt }] }],
              systemInstruction: { parts: [{ text: "당신은 최고 수준의 글로벌 전략 및 재무 컨설턴트입니다. 항상 전문적이고 명확하며, 가독성 높은 형태(Bullet points 사용 권장)로 한국어로 핵심만 답변합니다." }] }
            };

            let retries = 5;
            let delay = 1000;

            while (retries > 0) {
              try {
                const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                if (!res.ok) throw new Error(`API Error: ${res.status}`);
                const data = await res.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "결과를 생성하지 못했습니다.";
              } catch (err) {
                retries -= 1;
                if (retries === 0) return "AI 리포트 생성에 실패했습니다. 잠시 후 다시 시도해주세요.";
                await new Promise(r => setTimeout(r, delay));
                delay *= 2;
              }
            }
          };

          const fetchGoogleSheetData = async () => {
            if (!spreadsheetInput) return;
            const extractId = (input) => {
              const match = input.match(/\/d\/([a-zA-Z0-9-_]+)/);
              return match ? match[1] : input;
            };
            const actualId = extractId(spreadsheetInput);

            setLoading(true);
            setErrorMsg("");
            try {
              const url = `https://docs.google.com/spreadsheets/d/${actualId}/export?format=csv`;
              const response = await fetch(url);
              
              if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
              const text = await response.text();
              if (text.trim().startsWith("<!DOCTYPE html>")) throw new Error("권한 차단(HTML 반환). '링크가 있는 모든 사용자' 권한 확인 요망.");

              const rows = parseCSV(text);
              if (!rows || rows.length < 2) throw new Error("유효하지 않은 데이터 규격입니다.");

              const parsedQuarters = [];
              let headerIdx = rows.findIndex(r => r.some(c => String(c).includes("분기") || String(c).includes("Q")));
              if (headerIdx === -1) headerIdx = 0;
              const headerNames = rows[headerIdx].map(h => String(h).trim());

              headerNames.forEach((name, colIdx) => {
                if (colIdx === 0 || !name || name.includes("예정")) return; 
                
                const qData = { name, sales: 0, operatingProfit: 0, netIncome: 0, totalAssets: 0, totalEquity: 0, currentAssets: 0, quickAssets: 0, inventory: 0, receivables: 0, currentLiabilities: 0, krSales: 0, usSales: 0, cnSales: 0, salesVolume: 0 };
                let hasValidData = false;
                
                rows.forEach((row, rIdx) => {
                  if (rIdx <= headerIdx) return; 
                  
                  const rawKey = row[0] ? String(row[0]) : "";
                  const key = rawKey.replace(/[^가-힣a-zA-Z]/g, ""); 
                  const valStr = row[colIdx] ? String(row[colIdx]).replace(/[^0-9.-]/g, "") : "0";
                  const val = parseFloat(valStr) || 0;

                  if (val !== 0) hasValidData = true;

                  if (key.includes("매출액") && !key.includes("증가율")) qData.sales = val;
                  else if (key.includes("영업이익") && !key.includes("증가율") && !key.includes("이익률")) qData.operatingProfit = val;
                  else if (key.includes("당기순이익") && !key.includes("이익률")) qData.netIncome = val;
                  else if (key.includes("자산총계") && !key.includes("이익률")) qData.totalAssets = val;
                  else if ((key.includes("자본총계") || key.includes("자기자본")) && !key.includes("이익률") && !key.includes("ROE")) qData.totalEquity = val;
                  else if (key.includes("유동자산") && !key.includes("비율")) qData.currentAssets = val;
                  else if (key.includes("당좌자산") && !key.includes("비율")) qData.quickAssets = val;
                  else if (key.includes("재고자산") && !key.includes("회전")) qData.inventory = val;
                  else if (key.includes("매출채권") && !key.includes("회전")) qData.receivables = val;
                  else if ((key.includes("유동부채") || key.includes("부채총계")) && !key.includes("비율")) qData.currentLiabilities = val;
                  else if (key.includes("한국판매량")) qData.krSales = val;
                  else if (key.includes("미국판매량")) qData.usSales = val;
                  else if (key.includes("중국판매량")) qData.cnSales = val;
                  else if ((key.includes("총판매량") || key === "판매량") && !key.includes("한국") && !key.includes("미국") && !key.includes("중국")) qData.salesVolume = val;
                });

                if (hasValidData) parsedQuarters.push(qData);
              });

              if (parsedQuarters.length > 0) {
                setQuarters(parsedQuarters);
                const lastValidIdx = parsedQuarters.map(q => q.sales > 0).lastIndexOf(true);
                setSelectedQIdx(lastValidIdx >= 0 ? lastValidIdx : 0);
                setIsLinked(true);
              } else {
                throw new Error("데이터 파싱 결과가 0건입니다.");
              }
            } catch (err) {
              console.error("데이터 연동 실패, 데모 데이터 작동:", err);
              setErrorMsg(err.message);
              setQuarters(DEMO_QUARTERS);
              setSelectedQIdx(DEMO_QUARTERS.length - 1);
              setIsLinked(false);
            } finally {
              setLoading(false);
            }
          };

          useEffect(() => {
            fetchGoogleSheetData();
          }, [spreadsheetInput]);

          const processedRatios = useMemo(() => {
            return quarters.map((q, idx) => {
              const prevQ = idx > 0 ? quarters[idx - 1] : null;

              const currentRatio = q.currentLiabilities > 0 ? (q.currentAssets / q.currentLiabilities) * 100 : 0;
              const quickRatio = q.currentLiabilities > 0 ? (q.quickAssets / q.currentLiabilities) * 100 : 0;
              const inventoryTurnover = q.inventory > 0 ? q.sales / q.inventory : 0;
              const receivablesTurnover = q.receivables > 0 ? q.sales / q.receivables : 0;
              const roa = q.totalAssets > 0 ? (q.netIncome / q.totalAssets) * 100 : 0;
              const roe = q.totalEquity > 0 ? (q.netIncome / q.totalEquity) * 100 : 0;

              const salesGrowth = prevQ && prevQ.sales > 0 ? ((q.sales - prevQ.sales) / prevQ.sales) * 100 : 0;
              const opGrowth = prevQ && prevQ.operatingProfit > 0 ? ((q.operatingProfit - prevQ.operatingProfit) / prevQ.operatingProfit) * 100 : 0;

              return { ...q, currentRatio, quickRatio, inventoryTurnover, receivablesTurnover, roa, roe, salesGrowth, opGrowth };
            });
          }, [quarters]);

          const activeQ = processedRatios[selectedQIdx] || processedRatios[0];

          const calcNPV = (initial, cashflows, rate) => {
            const r = rate / 100;
            let npv = initial;
            for (let t = 0; t < cashflows.length; t++) npv += cashflows[t] / Math.pow(1 + r, t + 1);
            return npv;
          };

          const calcIRR = (initial, cashflows) => {
            let guess = 0.1;
            for (let i = 0; i < 100; i++) {
              let npv = initial, dNpv = 0;
              for (let t = 0; t < cashflows.length; t++) {
                const cf = cashflows[t];
                npv += cf / Math.pow(1 + guess, t + 1);
                dNpv -= ((t + 1) * cf) / Math.pow(1 + guess, t + 2);
              }
              const nextGuess = guess - npv / dNpv;
              if (Math.abs(nextGuess - guess) < 1e-6) return nextGuess * 100;
              guess = nextGuess;
            }
            return guess * 100;
          };

          const bepVolume = useMemo(() => {
            const unitMargin = price - variableCost;
            if (unitMargin <= 0) return Infinity;
            return Math.ceil(fixedCost / unitMargin);
          }, [price, variableCost, fixedCost]);

          const simulatedProfit = (price - variableCost) * targetVolume - fixedCost;

          const handleGenerateSummaryAI = async () => {
            setIsAiSummaryLoading(true);
            setAiSummaryReport("");
            const prompt = `임재현 팀의 ${activeQ.name} 실적: 매출 ${formatMillion(activeQ.sales)}(성장 ${activeQ.salesGrowth.toFixed(1)}%), 영업이익 ${formatMillion(activeQ.operatingProfit)}(성장 ${activeQ.opGrowth.toFixed(1)}%), ROE ${activeQ.roe.toFixed(2)}%, 유동비율 ${activeQ.currentRatio.toFixed(2)}%.
경영진 브리핑을 마크다운으로 3항목 작성: 1. 재무 요약(2줄) 2. 강점(Bullet) 3. 리스크 및 제언(Bullet)`;
            const result = await callGeminiAPI(prompt);
            setAiSummaryReport(result);
            setIsAiSummaryLoading(false);
          };

          const handleGenerateDecisionAI = async () => {
            setIsAiDecisionLoading(true);
            setAiDecisionReport("");
            const projectData = investments.map(inv => `- ${inv.title} | NPV: ${formatMillion(calcNPV(inv.initial, inv.cf, discountRate))} | IRR: ${calcIRR(inv.initial, inv.cf).toFixed(1)}%`).join("\n");
            const prompt = `요구수익률(WACC) ${discountRate}%. 투자안 평가 결과:\n${projectData}\n경영진 브리핑 마크다운 작성: 1. 투자 우선순위 요약 2. 각 투자안 정성 리스크 및 검토 조언(Bullet)`;
            const result = await callGeminiAPI(prompt);
            setAiDecisionReport(result);
            setIsAiDecisionLoading(false);
          };

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans antialiased text-sm">
              <header className="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
                <div className="max-w-[1400px] mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 bg-blue-700 rounded-lg flex items-center justify-center text-white font-black text-xl shadow-md">JE</div>
                    <div>
                      <h1 className="text-2xl font-extrabold text-slate-900 tracking-tight">임재현 팀</h1>
                      <p className="text-xs text-slate-500 font-medium mt-0.5">Investor Relations & Executive Dashboard</p>
                    </div>
                  </div>

                  <div className="flex items-center gap-4">
                    <div className={`flex items-center gap-2 px-3 py-1.5 rounded-md border text-xs font-semibold ${isLinked ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 'bg-amber-50 border-amber-200 text-amber-700'}`} title={errorMsg}>
                      <span className={`w-2 h-2 rounded-full ${isLinked ? 'bg-emerald-500 animate-pulse' : 'bg-amber-500 animate-pulse'}`}></span>
                      {isLinked ? 'Live Data Synced' : 'Demo Data Active'}
                    </div>
                    <button onClick={fetchGoogleSheetData} disabled={loading} className="bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white px-4 py-2 rounded-md text-xs font-bold transition-colors shadow-sm flex items-center gap-2">
                      {loading ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-rotate-right"></i>}
                      데이터 갱신
                    </button>
                  </div>
                </div>

                <div className="max-w-[1400px] mx-auto px-6 flex gap-8 overflow-x-auto">
                  {[{ id: 'summary', name: '종합 성과 대시보드' }, { id: 'financials', name: '상세 재무제표 분석' }, { id: 'decisions', name: '자본예산 의사결정 (NPV/IRR)' }, { id: 'whatif', name: '시나리오 시뮬레이터 (What-If)' }].map(tab => (
                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`py-4 text-sm font-bold border-b-[3px] transition-colors outline-none whitespace-nowrap ${activeTab === tab.id ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-500 hover:text-slate-800 hover:border-slate-300'}`}>
                      {tab.name}
                    </button>
                  ))}
                </div>
              </header>

              <main className="max-w-[1400px] mx-auto p-6 space-y-8 mt-4">
                {!isLinked && errorMsg && (
                  <div className="bg-amber-50 text-amber-700 border border-amber-200 p-4 rounded-xl text-sm font-bold flex items-center gap-3">
                    <i className="fa-solid fa-circle-info text-amber-500"></i>
                    구글 시트 연동 오류 (입력하신 사용자 보정 데모 데이터로 정상 구동 중입니다): {errorMsg}
                  </div>
                )}

                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
                  <div className="bg-white border border-slate-200 p-6 rounded-xl shadow-sm relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-1 h-full bg-blue-600"></div>
                    <div className="text-sm font-semibold text-slate-500">당기 매출액 ({activeQ.name})</div>
                    <div className="text-3xl font-black text-slate-900 mt-2">{formatMillion(activeQ.sales)}</div>
                    <div className="mt-3 flex items-center gap-2">
                      <span className={`px-2 py-0.5 rounded text-xs font-bold ${activeQ.salesGrowth >= 0 ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}`}>
                        {activeQ.salesGrowth >= 0 ? '▲' : '▼'} {Math.abs(activeQ.salesGrowth || 0).toFixed(1)}%
                      </span>
                      <span className="text-xs text-slate-400 font-medium">vs 전기 대비</span>
                    </div>
                  </div>

                  <div className="bg-white border border-slate-200 p-6 rounded-xl shadow-sm relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-1 h-full bg-amber-500"></div>
                    <div className="text-sm font-semibold text-slate-500">영업이익 ({activeQ.name})</div>
                    <div className="text-3xl font-black text-slate-900 mt-2">{formatMillion(activeQ.operatingProfit)}</div>
                    <div className="mt-3 flex items-center gap-2">
                      <span className={`px-2 py-0.5 rounded text-xs font-bold ${activeQ.opGrowth >= 0 ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}`}>
                        {activeQ.opGrowth >= 0 ? '▲' : '▼'} {Math.abs(activeQ.opGrowth || 0).toFixed(1)}%
                      </span>
                      <span className="text-xs text-slate-400 font-medium">vs 전기 대비</span>
                    </div>
                  </div>

                  <div className="bg-white border border-slate-200 p-6 rounded-xl shadow-sm relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                    <div className="text-sm font-semibold text-slate-500">자기자본이익률 (ROE)</div>
                    <div className="text-3xl font-black text-slate-900 mt-2">{formatRatio(activeQ.roe)}</div>
                    <div className="mt-3 text-xs text-slate-400 font-medium">자본 효율성 및 수익 창출 능력 지표</div>
                  </div>

                  <div className="bg-white border border-slate-200 p-6 rounded-xl shadow-sm relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
                    <div className="text-sm font-semibold text-slate-500">유동비율 (Current Ratio)</div>
                    <div className="text-3xl font-black text-slate-900 mt-2">{formatRatio(activeQ.currentRatio)}</div>
                    <div className="mt-3 text-xs text-slate-400 font-medium">재무 건전성 및 단기 채무 상환 능력</div>
                  </div>
                </div>

                {activeTab === 'summary' && (
                  <div className="space-y-6">
                    <div className="bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-200 p-6 rounded-xl shadow-sm">
                      <div className="flex justify-between items-center mb-4">
                        <div className="flex items-center gap-2">
                          <span className="text-xl">✨</span>
                          <h2 className="font-bold text-blue-900 text-lg">AI 경영 성과 진단 브리핑</h2>
                        </div>
                        <button onClick={handleGenerateSummaryAI} disabled={isAiSummaryLoading} className="bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md transition-all flex items-center gap-2">
                          {isAiSummaryLoading ? <i className="fa-solid fa-spinner fa-spin"></i> : "✨ AI 리포트 생성"}
                        </button>
                      </div>
                      {aiSummaryReport ? (
                        <div className="bg-white p-5 rounded-lg border border-blue-100 text-slate-700 text-sm leading-relaxed whitespace-pre-wrap">{aiSummaryReport}</div>
                      ) : (
                        <div className="bg-white/60 p-5 rounded-lg border border-blue-100 border-dashed text-slate-500 text-sm text-center">우측 상단의 생성 버튼을 클릭하여 Gemini 기반의 실시간 재무 분석 리포트를 확인하세요.</div>
                      )}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                      <div className="lg:col-span-2 bg-white border border-slate-200 p-6 rounded-xl shadow-sm flex flex-col justify-between">
                        <div className="border-b border-slate-100 pb-4 mb-6 flex justify-between items-center">
                          <h2 className="font-bold text-slate-800 text-lg">경영 실적 성장 추이 (매출 및 이익)</h2>
                          <span className="text-xs text-slate-500 font-semibold bg-slate-100 px-2 py-1 rounded">단위: 억 원</span>
                        </div>
                        
                        <div className="h-80 flex items-end gap-6 border-b border-slate-200 pb-2 relative px-4">
                          <div className="absolute top-0 left-0 w-full h-full flex flex-col justify-between pointer-events-none">
                            {[...Array(5)].map((_, i) => (<div key={i} className="w-full border-t border-slate-100 border-dashed"></div>))}
                          </div>
                          {processedRatios.map((q, idx) => {
                            const maxVal = Math.max(...quarters.map(item => item.sales), 1);
                            const sHeight = (q.sales / maxVal) * 90;
                            const pHeight = (q.operatingProfit / maxVal) * 90;
                            return (
                              <div key={idx} className="flex-1 flex flex-col items-center h-full justify-end relative group z-10">
                                <div className="absolute bottom-full mb-3 bg-slate-800 text-white text-xs p-3 rounded-lg shadow-xl opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none w-36">
                                  <div className="font-bold mb-1 border-b border-slate-600 pb-1">{q.name}</div>
                                  <div className="text-blue-300 flex justify-between"><span>매출:</span> <span>{formatMillion(q.sales)}</span></div>
                                  <div className="text-amber-400 flex justify-between"><span>이익:</span> <span>{formatMillion(q.operatingProfit)}</span></div>
                                </div>
                                <div className="w-full flex justify-center gap-1.5 h-full items-end">
                                  <div style={{ height: `${sHeight}%` }} className="w-8 bg-blue-600 rounded-t-sm shadow-sm group-hover:bg-blue-500 transition-colors"></div>
                                  <div style={{ height: `${Math.max(pHeight, 1)}%` }} className="w-8 bg-amber-500 rounded-t-sm shadow-sm group-hover:bg-amber-400 transition-colors"></div>
                                </div>
                                <span className="text-xs text-slate-600 font-semibold mt-3 whitespace-nowrap">{q.name}</span>
                              </div>
                            );
                          })}
                        </div>
                        <div className="flex justify-center mt-6 gap-6 text-sm font-semibold text-slate-600">
                          <div className="flex items-center gap-2"><span className="w-3.5 h-3.5 bg-blue-600 rounded-sm shadow-sm"></span> 매출액</div>
                          <div className="flex items-center gap-2"><span className="w-3.5 h-3.5 bg-amber-500 rounded-sm shadow-sm"></span> 영업이익</div>
                        </div>
                      </div>

                      <div className="bg-white border border-slate-200 p-6 rounded-xl shadow-sm flex flex-col justify-between">
                        <div className="border-b border-slate-100 pb-4 mb-6"><h2 className="font-bold text-slate-800 text-lg">지역별 판매 비중 분석</h2></div>
                        <div className="flex-1 flex flex-col justify-center space-y-6">
                          <div className="flex justify-between items-center bg-slate-50 p-3 rounded-lg border border-slate-200">
                            <span className="text-slate-600 font-semibold text-sm">분석 대상 분기</span>
                            <select value={selectedQIdx} onChange={(e) => setSelectedQIdx(Number(e.target.value))} className="bg-white border border-slate-300 text-slate-800 text-sm font-bold py-1.5 px-3 rounded-md shadow-sm outline-none focus:ring-2 focus:ring-blue-500">
                              {quarters.map((q, idx) => (<option key={idx} value={idx}>{q.name}</option>))}
                            </select>
                          </div>
                          <div className="space-y-5">
                            {[{ label: "한국 내수 시장", val: activeQ.krSales, color: "bg-blue-600" }, { label: "미국 수출", val: activeQ.usSales, color: "bg-indigo-500" }, { label: "중국 수출", val: activeQ.cnSales, color: "bg-emerald-500" }].map((item, idx) => {
                              const total = activeQ.salesVolume || 1;
                              const pct = total > 0 ? (item.val / total) * 100 : 0;
                              return (
                                <div key={idx} className="space-y-2">
                                  <div className="flex justify-between items-end">
                                    <span className="font-bold text-slate-700 text-sm">{item.label}</span>
                                    <div className="text-right">
                                      <span className="font-black text-slate-900 text-base">{formatRaw(item.val)}대</span>
                                      <span className="text-slate-500 text-xs ml-2 font-medium">({(pct || 0).toFixed(1)}%)</span>
                                    </div>
                                  </div>
                                  <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                                    <div style={{ width: `${pct}%` }} className={`h-full ${item.color} rounded-full`}></div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'financials' && (
                  <div className="bg-white border border-slate-200 p-8 rounded-xl shadow-sm">
                    <div className="border-b border-slate-200 pb-4 mb-6 flex justify-between items-end">
                      <div><h2 className="text-xl font-bold text-slate-900">핵심 재무상태표 및 손익계산 요약</h2></div>
                      <span className="text-xs font-bold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-md">단위: 원 (KRW) / 비율 (%)</span>
                    </div>
                    <div className="overflow-x-auto pb-4">
                      <table className="w-full text-left border-collapse min-w-[800px]">
                        <thead>
                          <tr>
                            <th className="py-4 px-4 bg-slate-50 font-bold text-slate-700 border-b-2 border-slate-300 sticky left-0 z-10 w-1/4">재무 지표 항목</th>
                            {processedRatios.map((q, idx) => (<th key={idx} className="py-4 px-4 bg-slate-50 font-bold text-slate-700 text-right border-b-2 border-slate-300 whitespace-nowrap">{q.name}</th>))}
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          <tr className="bg-slate-50/50"><td colSpan={quarters.length + 1} className="py-3 px-4 font-extrabold text-blue-800 text-xs sticky left-0 z-10">1. 영업 및 재무 상태</td></tr>
                          {[
                            { label: "매출액", key: "sales" }, { label: "영업이익", key: "operatingProfit" }, { label: "당기순이익", key: "netIncome" },
                            { label: "자산총계", key: "totalAssets" }, { label: "자본총계 (자기자본)", key: "totalEquity" }, { label: "유동자산", key: "currentAssets" },
                            { label: "당좌자산", key: "quickAssets" }, { label: "재고자산", key: "inventory" }, { label: "매출채권", key: "receivables" }, { label: "유동부채", key: "currentLiabilities" }
                          ].map((row, idx) => (
                            <tr key={idx} className="hover:bg-slate-50 transition-colors">
                              <td className="py-3.5 px-4 font-semibold text-slate-700 sticky left-0 bg-white shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)] z-10 border-r border-slate-100">{row.label}</td>
                              {processedRatios.map((q, qIdx) => (<td key={qIdx} className="py-3.5 px-4 text-right font-mono text-slate-600 font-medium">{formatRaw(q[row.key])}</td>))}
                            </tr>
                          ))}
                          <tr className="bg-slate-50/50"><td colSpan={quarters.length + 1} className="py-3 px-4 font-extrabold text-blue-800 text-xs sticky left-0 z-10 border-t-2 border-slate-200 mt-4">2. 핵심 재무 비율 분석 (수식 연동)</td></tr>
                          {[
                            { label: "유동비율", key: "currentRatio", format: formatRatio },
                            { label: "당좌비율", key: "quickRatio", format: formatRatio },
                            { label: "재고자산 회전율", key: "inventoryTurnover", format: formatTurnover },
                            { label: "매출채권 회전율", key: "receivablesTurnover", format: formatTurnover },
                            { label: "총자산이익률 (ROA)", key: "roa", format: formatRatio },
                            { label: "자기자본이익률 (ROE)", key: "roe", format: formatRatio }
                          ].map((row, idx) => (
                            <tr key={idx} className="hover:bg-slate-50 transition-colors">
                              <td className="py-3.5 px-4 font-semibold text-slate-700 sticky left-0 bg-white shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)] z-10 border-r border-slate-100">{row.label}</td>
                              {processedRatios.map((q, qIdx) => (<td key={qIdx} className="py-3.5 px-4 text-right font-mono text-slate-600 font-medium">{row.format(q[row.key])}</td>))}
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {activeTab === 'decisions' && (
                  <div className="space-y-6">
                    <div className="bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-200 p-6 rounded-xl shadow-sm">
                      <div className="flex justify-between items-center mb-4">
                        <div className="flex items-center gap-2">
                          <span className="text-xl">📊</span>
                          <h2 className="font-bold text-blue-900 text-lg">AI 자본예산 투자 심의 의견</h2>
                        </div>
                        <button onClick={handleGenerateDecisionAI} disabled={isAiDecisionLoading} className="bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md transition-all flex items-center gap-2">
                          {isAiDecisionLoading ? <i className="fa-solid fa-spinner fa-spin"></i> : "📊 AI 심의의견 생성"}
                        </button>
                      </div>
                      {aiDecisionReport ? (
                        <div className="bg-white p-5 rounded-lg border border-blue-100 text-slate-700 text-sm leading-relaxed whitespace-pre-wrap">{aiDecisionReport}</div>
                      ) : (
                        <div className="bg-white/60 p-5 rounded-lg border border-blue-100 border-dashed text-slate-500 text-sm text-center">우측 상단의 생성 버튼을 클릭하여 투자 제안서별 정량/정성 검토 의견을 자동 생성하세요.</div>
                      )}
                    </div>

                    <div className="bg-white border border-slate-200 p-6 rounded-xl shadow-sm">
                      <div className="border-b border-slate-100 pb-4 mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div>
                          <h2 className="font-bold text-slate-800 text-lg">독립적 투자안의 경제성 분석 (Capital Budgeting)</h2>
                          <p className="text-xs text-slate-500 mt-1">현금흐름 할인모형(DCF) 기반 자본비용 반영 실시간 연동</p>
                        </div>
                        <div className="flex items-center gap-3 bg-slate-50 p-2 rounded-lg border border-slate-200">
                          <span className="text-xs text-slate-600 font-bold whitespace-nowrap">요구수익률 (WACC)</span>
                          <div className="flex items-center gap-1">
                            <input type="number" step="0.1" value={discountRate} onChange={(e) => setDiscountRate(parseFloat(e.target.value) || 0)} className="w-16 bg-white border border-slate-300 text-slate-800 text-center text-sm font-bold py-1 rounded-md outline-none focus:ring-2 focus:ring-blue-500"/>
                            <span className="text-sm font-bold text-slate-500">%</span>
                          </div>
                        </div>
                      </div>

                      <div className="overflow-x-auto">
                        <table className="w-full text-left border-collapse min-w-[800px]">
                          <thead>
                            <tr className="border-b border-slate-200">
                              <th className="py-3 px-4 bg-slate-50/70 font-bold text-slate-700">투자 프로젝트명</th>
                              <th className="py-3 px-4 bg-slate-50/70 font-bold text-slate-700 text-right">초기 투자 지출액</th>
                              <th className="py-3 px-4 bg-slate-50/70 font-bold text-slate-700 text-right">1차년도 CF</th>
                              <th className="py-3 px-4 bg-slate-50/70 font-bold text-slate-700 text-right">2차년도 CF</th>
                              <th className="py-3 px-4 bg-slate-50/70 font-bold text-slate-700 text-right">3차년도 CF</th>
                              <th className="py-3 px-4 bg-slate-50/70 font-bold text-slate-700 text-right">4차년도 CF</th>
                              <th className="py-3 px-4 bg-blue-50 font-bold text-blue-800 text-right border-l border-blue-100">순현재가치 (NPV)</th>
                              <th className="py-3 px-4 bg-indigo-50 font-bold text-indigo-800 text-right border-l border-indigo-100">내부수익률 (IRR)</th>
                              <th className="py-3 px-4 bg-slate-50 font-bold text-slate-700 text-center">타당성 결정</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100">
                            {investments.map((inv, idx) => {
                              const npv = calcNPV(inv.initial, inv.cf, discountRate);
                              const irr = calcIRR(inv.initial, inv.cf);
                              return (
                                <tr key={inv.id} className="hover:bg-slate-50/50 transition-colors">
                                  <td className="py-4 px-4 font-bold text-slate-800">{inv.title}</td>
                                  <td className="py-4 px-4 text-right font-mono text-rose-600 font-semibold">{formatRaw(inv.initial)}원</td>
                                  {inv.cf.map((cash, cIdx) => (<td key={cIdx} className="py-4 px-4 text-right font-mono text-slate-600 font-medium">+{formatRaw(cash)}원</td>))}
                                  <td className="py-4 px-4 text-right font-mono font-bold bg-blue-50/40 border-l border-blue-100 text-blue-700">{formatRaw(Math.round(npv))}원</td>
                                  <td className="py-4 px-4 text-right font-mono font-bold bg-indigo-50/40 border-l border-indigo-100 text-indigo-700">{irr.toFixed(2)}%</td>
                                  <td className="py-4 px-4 text-center">
                                    <span className={`px-2.5 py-1 rounded-full text-xs font-black ${npv >= 0 ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}`}>
                                      {npv >= 0 ? '투자 채택 (Go)' : '투자 기각 (Reject)'}
                                    </span>
                                  </td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'whatif' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="bg-white border border-slate-200 p-6 rounded-xl shadow-sm space-y-6">
                      <div className="border-b border-slate-100 pb-3"><h2 className="font-bold text-slate-800 text-lg">시뮬레이션 변수 입력 필드</h2></div>
                      <div className="space-y-4">
                        <div className="space-y-2">
                          <div className="flex justify-between text-xs font-bold text-slate-600"><span>제품 판매 단가 (Unit Price)</span><span>{formatRaw(price)} 원</span></div>
                          <input type="range" min="450000" max="1000000" step="10000" value={price} onChange={(e) => setPrice(Number(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"/>
                        </div>
                        <div className="space-y-2">
                          <div className="flex justify-between text-xs font-bold text-slate-600"><span>단위당 변동비 (Variable Cost)</span><span>{formatRaw(variableCost)} 원</span></div>
                          <input type="range" min="300000" max="600000" step="10000" value={variableCost} onChange={(e) => setVariableCost(Number(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-amber-500"/>
                        </div>
                        <div className="space-y-2">
                          <div className="flex justify-between text-xs font-bold text-slate-600"><span>총 고정비 (Fixed Cost / 분기)</span><span>{formatMillion(fixedCost)}</span></div>
                          <input type="range" min="15000000000" max="45000000000" step="500000000" value={fixedCost} onChange={(e) => setFixedCost(Number(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-500"/>
                        </div>
                        <div className="space-y-2">
                          <div className="flex justify-between text-xs font-bold text-slate-600"><span>목표 판매량 (Target Volume)</span><span>{formatRaw(targetVolume)} 대</span></div>
                          <input type="range" min="50000" max="250000" step="5000" value={targetVolume} onChange={(e) => setTargetVolume(Number(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-emerald-500"/>
                        </div>
                      </div>
                    </div>

                    <div className="lg:col-span-2 bg-white border border-slate-200 p-6 rounded-xl shadow-sm flex flex-col justify-between">
                      <div className="border-b border-slate-100 pb-3"><h2 className="font-bold text-slate-800 text-lg">손익분기점(BEP) 산출 및 추정 이익 리포트</h2></div>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 my-4">
                        <div className="bg-slate-50 border border-slate-200 p-5 rounded-lg text-center">
                          <div className="text-xs text-slate-500 font-bold">계산된 손익분기점 (BEP 판매량)</div>
                          <div className="text-3xl font-black text-slate-900 mt-2">{bepVolume === Infinity ? '계산 불가능' : `${formatRaw(bepVolume)} 대`}</div>
                          <p className="text-xs text-slate-400 font-medium mt-1">단위당 공헌이익: {formatRaw(price - variableCost)}원</p>
                        </div>
                        <div className={`border p-5 rounded-lg text-center ${simulatedProfit >= 0 ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}`}>
                          <div className="text-xs text-slate-500 font-bold">목표 수량 도달 시 예상 영업손익</div>
                          <div className={`text-3xl font-black mt-2 ${simulatedProfit >= 0 ? 'text-emerald-700' : 'text-rose-700'}`}>{formatMillion(simulatedProfit)}</div>
                          <p className="text-xs text-slate-400 font-medium mt-1">공헌이익률: {price > 0 ? ((price - variableCost) / price * 100).toFixed(1) : 0}%</p>
                        </div>
                      </div>

                      <div className="space-y-2 mt-4">
                        <div className="text-xs font-bold text-slate-600 flex justify-between"><span>목표치 달성 스케일바 비주얼 (최대 25만대 기준)</span><span className="font-mono text-slate-400">BEP 기준선 오버레이</span></div>
                        <div className="relative pt-2 pb-6">
                          <div className="h-4 w-full bg-slate-100 rounded-full overflow-hidden shadow-inner relative">
                            <div style={{ width: `${Math.min((targetVolume / 250000) * 100, 100)}%` }} className={`h-full transition-all duration-500 ${targetVolume >= bepVolume ? 'bg-emerald-500' : 'bg-amber-400'}`}></div>
                            {bepVolume !== Infinity && bepVolume < 250000 && (<div style={{ left: `${(bepVolume / 250000) * 100}%` }} className="absolute top-0 bottom-0 w-1.5 bg-rose-500 shadow-md"></div>)}
                          </div>
                          <div className="absolute top-12 w-full flex justify-between text-xs font-bold text-slate-500">
                            <span>0 대</span>
                            {bepVolume !== Infinity && bepVolume < 250000 && (<span className="text-rose-600 absolute" style={{ left: `calc(${(bepVolume / 250000) * 100}% - 20px)` }}>BEP 선</span>)}
                            <span className="text-emerald-600 absolute right-0 text-right">목표치: {targetVolume.toLocaleString()} 대</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
